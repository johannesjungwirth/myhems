  plenticore_port: 1502
  plenticore_slave: 71

  # Shelly Pro 3EM – WP-Verbrauch (noch nicht in Regellogik)
  shelly_wp:
    ip: "192.168.178.175"
    typ: "EM"

  # Shelly Plus Uni – SG-Ready (noch nicht aktiv)
  shelly_sgready:  "192.168.178.171"

  # Shelly The Pill – Pufferspeicher Temperaturen
